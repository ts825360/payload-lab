name: 🟡 구현 · 기능
description: 새 랩·기능·인터페이스를 만든다
title: "🟡 [구현] "
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        규칙: `docs/issue-guide.md`. 제목은 **우선순위 이모지 + 동사 + 구체**로.
        ⚠️ 폼은 라벨을 자동으로 못 붙입니다 — 생성 후 **우선순위(P0~P3)·area 라벨**을 직접 다세요.
  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      description: 제목 이모지와 P 라벨을 이 값에 맞추세요
      options:
        - 🔴 P0 — 마일스톤/데모를 막음
        - 🟠 P1 — 높음
        - 🟡 P2 — 중간
        - 🟢 P3 — 낮음
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 영역(area)
      multiple: true
      options:
        - backend
        - frontend
        - lens
        - visualization
        - infra
        - docs
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 문제
      description: 무엇이 왜 필요한가. 배경·제약·관련 파일 경로를 구체적으로.
      placeholder: |
        -
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안
      description: 어떻게 만들 것인가. 파일·타입·예시를 넣어 본문만으로 착수 가능하게.
      placeholder: |
        -
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: 검증
      description: 완료를 어떻게 확인하나 (테스트·수동 확인·불변식).
      placeholder: |
        -
    validations:
      required: true
  - type: input
    id: related
    attributes:
      label: 관련
      description: 관련 이슈/PR/문서
      placeholder: "#21, docs/..."
